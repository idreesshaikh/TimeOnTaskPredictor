# Condition 2 of 2 — IMAGE + FEATURES + TASK = configs/vlm.yaml + the task
# title in the prompt. Overlay: inherit every knob from the base (including
# the `lupi:` privileged-feature training blend) and override ONLY the
# difference, so the gap between the two conditions cleanly measures the
# goal-driven share of dwell. max_seq_length already has task headroom.
base: vlm.yaml

paths:
  output_dir: artifacts_lam50/vlm_task_ckpt             # separate checkpoints
  train_card: artifacts_lam50/vlm_task_train_card.md    # separate stage card

data:
  include_task_title: true          # ← the ONLY difference vs configs/vlm.yaml

train:
  run_name: qwen3vl4b-qlora-pathA-task
