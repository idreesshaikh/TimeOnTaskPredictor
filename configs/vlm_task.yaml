# Condition 2 of 2 — SCREENSHOT + TASK TITLE = configs/vlm.yaml + the task
# title in the prompt. Overlay: inherit every knob from the base (including
# the `lupi:` outcome-feature blend and the `ui:` scaffold supervision) and
# override ONLY the difference, so the gap between the two conditions cleanly
# measures the goal-driven share of dwell. max_seq_length already has task
# headroom.
base: vlm.yaml

paths:
  output_dir: artifacts/vlm_task_ckpt             # separate checkpoints
  train_card: artifacts/vlm_task_train_card.md    # separate stage card

data:
  include_task_title: true          # ← the ONLY difference vs configs/vlm.yaml

train:
  run_name: qwen3vl4b-qlora-v3-task
