# Paper figure factory (scripts/make_figures.py) — CPU-only, regenerable
# from cached artifacts_lam50.
seed: 42

# read so figures can never disagree with the tables in eval_report.md
eval_config: configs/eval.yaml

paths:
  rows_final: data/processed/rows_final.parquet
  eval_metrics: artifacts_lam50/eval_metrics.json          # written by evaluate.py
  eval_predictions: artifacts_lam50/eval_predictions.parquet
  baseline_model: artifacts_lam50/baseline_lgbm.txt
  out_dir: artifacts_lam50/figures
  card: artifacts_lam50/figures/figures_card.md

style:
  dpi: 200                  # print-quality PNG
  font_size: 9

dwell_distribution:
  bins: 60                  # log-spaced histogram bins

scatter:
  max_points: 4000          # seeded subsample if a panel exceeds this
  alpha: 0.35
  point_size: 9

calibration:
  n_bins: 10                # decile bins, same as the eval report

feature_importance:
  top_n: 15                 # gain-ranked LightGBM features shown
