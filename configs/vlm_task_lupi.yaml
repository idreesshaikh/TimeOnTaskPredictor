# LUPI + task title: identical to configs/vlm_task.yaml EXCEPT the train
# targets are blended toward the privileged-feature LightGBM teacher (see
# configs/vlm_lupi.yaml for the mechanism). Prompt and inference are exactly
# the screen+task condition's — privileged features never leave training.
seed: 42

paths:
  rows_final: data/processed/rows_final.parquet   # split + winsorized dwell_s
  output_dir: artifacts/vlm_task_lupi_ckpt        # separate checkpoints
  train_card: artifacts/vlm_task_lupi_train_card.md

lupi:                               # ← the ONLY difference vs configs/vlm_task.yaml
  teacher_preds: artifacts/lupi_teacher_preds.parquet  # scripts/make_lupi_teacher.py
  lambda: 0.5                       # soft-target weight: 0 = plain SFT,
                                    # 1 = pure teacher; blended in log1p space

model:
  checkpoint: unsloth/Qwen3-VL-4B-Instruct
  load_in_4bit: true                # QLoRA
  gradient_checkpointing: true      # Unsloth offloaded checkpointing
  max_seq_length: 1536              # ~768 visual tokens + prompt + task title
  finetune_vision_layers: false     # SPEC.md: vision frozen
  lora_r: 16
  lora_alpha: 16
  lora_dropout: 0.0

image:                              # bounds Qwen3-VL visual tokens (28 px grid)
  max_side: 1024
  min_pixels: 100352                # 128 * 28^2  → ≥128 visual tokens
  max_pixels: 602112                # 768 * 28^2  → ≤768 visual tokens

data:
  include_task_title: true          # same prompt as configs/vlm_task.yaml

train:
  learning_rate: 2.0e-4
  num_epochs: 2                     # ~87k resolved train screens at the 100k
                                    # row budget — 2 passes ≈ 11k optim steps
  batch_size: 4                     # per-device micro-batch (verify memory fit
  grad_accum: 4                     #  with --dry-run first) → effective 16
  eval_batch_size: 4
  warmup_ratio: 0.03
  weight_decay: 0.01
  lr_scheduler: cosine
  optim: adamw_8bit
  max_grad_norm: 1.0
  logging_steps: 5
  save_total_limit: 2
  report_to: wandb
  wandb_project: tot-vlm
  run_name: qwen3vl4b-qlora-pathA-task-lupi

eval:
  decode_samples: 32                # val screens greedily decoded per epoch
  max_new_tokens: 12                # "dwell_seconds: 9999.9" ≈ 10 tokens

dry_run:                            # --dry-run: SAME batch/pixels (doubles as the
  n_train: 50                       # memory smoke test), tiny data + few steps
  n_val: 16
  max_steps: 12
  logging_steps: 1
  decode_samples: 8
  report_to: none
