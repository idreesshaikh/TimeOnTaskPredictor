# External zero-shot validation (READ-ONLY set — SPEC.md rules).
# This config is the ONLY yaml allowed to reference data/external
# (enforced by tests/test_external_guard.py).
seed: 42

vlm_config: configs/vlm.yaml   # prompt/image knobs must match training

source: vsgui10k

paths:
  # The FROZEN image+features model (screenshot in, features distilled at
  # train time). Its privileged features were train-time only, so this
  # images-only external set stays a valid zero-shot probe.
  adapters: artifacts/vlm_ckpt/final
  external_root: data/external
  card: artifacts/external_card.md
  preds: artifacts/external_preds.parquet
  report: artifacts/external_report.md
  scatter_png: artifacts/external_scatter.png

vsgui10k:
  zip_url: https://osf.io/download/wbxdr/      # OSF project hmg9b
  min_trials_per_screen: 3    # per-screen median needs a few observations
  target_present_only: true   # target-absent trials measure give-up time
  aggregate: median           # per-screen aggregate across trials

predict:                      # GPU stage (frozen adapters, zero-shot)
  batch_size: 8
  max_new_tokens: 12

report:
  bootstrap_samples: 10000    # seeded bootstrap over items for the CI
  ci: 0.95
  primary_category: web       # in-domain subset (model is web-trained);
                              # mobile/desktop reported as secondary

aim:                          # theory-grounding analysis (scripts/analyze_aim.py),
                              # post-hoc over the CACHED zero-shot predictions
  metrics_csv: data/external/vsgui10k/aim_metrics.csv
  report: artifacts/aim_analysis.md
  metrics:                    # AIM column → construct (readable name)
    m4_0: contour_density
    m5_0: figure_ground_contrast
    m6_0: contour_congestion
    m7_0: subband_entropy
    m8_0: feature_congestion      # Rosenholtz clutter
    m11_0: color_clusters_static
    m12_0: color_clusters_dynamic
    m13_0: luminance_sd
    m15_0: colorfulness
  bootstrap_samples: 10000
  ci: 0.95
