# λ grid point 0.25 — FULL-fidelity run of the screen-only condition.
# The v3 grid is fixed and exhaustive: {0, 0.25, 0.5, 0.75, 1}. λ=0 doubles
# as the no-distillation ablation, λ=1 as the pure-teacher ablation. Each
# point trains on the full train split; selection happens on the FULL val
# split (scripts/decode_val.py → scripts/select_lambda.py). TEST is never
# used to choose λ.
base: ../vlm.yaml

paths:
  output_dir: artifacts/sweeps/vlm_lam025
  train_card: artifacts/sweeps/vlm_lam025_card.md

lupi:
  lambda: 0.25

train:
  run_name: qwen3vl4b-v3-lam025
