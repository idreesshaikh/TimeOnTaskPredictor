# FULL-DATA run at λ=0.65 — image+features only, NOT part of the 15k-row λ
# sweep. Inherits everything from vlm.yaml (no train subsample, full ~87k
# rows) and changes only λ + output paths. Outputs live under artifacts/full/
# — outside artifacts/sweeps/ — so select_lambda.py's default glob never mixes
# this full-fidelity run into the subsampled sweep ranking. Scored on FULL
# val by scripts/decode_val.py (sweep_lam.sbatch runs it after training);
# TEST is never touched.
base: ../vlm.yaml

paths:
  output_dir: artifacts/full/vlm_lam65
  train_card: artifacts/full/vlm_lam65_card.md

lupi:
  lambda: 0.65

train:
  run_name: qwen3vl4b-full-lam65
