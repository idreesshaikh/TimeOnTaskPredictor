# λ sweep overlay — VAL SELECTION ONLY. One global distillation weight.
# λ=0 is the ablation reference: plain SFT on the true label, no teacher — it
# answers "does distilling the privileged features help at all?". Train the
# grid, compare VAL decode MAE(log) with scripts/select_lambda.py, then copy the
# winner into configs/vlm.yaml before the final two-condition run. TEST is never
# touched. Image+features condition (task title inherited = false); everything
# but λ inherits configs/vlm.yaml, so λ is the only thing that varies.
base: ../vlm.yaml

paths:
  output_dir: artifacts/sweeps/vlm_lam00
  train_card: artifacts/sweeps/vlm_lam00_card.md

lupi:
  lambda: 0.0

train:
  run_name: qwen3vl4b-sweep-lam00