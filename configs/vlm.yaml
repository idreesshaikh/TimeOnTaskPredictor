# Qwen3-VL QLoRA SFT — Path A: emit `dwell_seconds: X.X` as text.
# SPEC.md rule: ALL tunable numbers live here, never in code.
#
# Condition 1 of 2 — IMAGE + FEATURES. The model sees only the screenshot at
# inference, but at TRAIN time its targets are blended toward a LightGBM
# teacher that saw the privileged trajectory features (axTree structure, nav
# flag, step index, click area) — features the screenshot itself can't show.
# That is the `lupi:` block below (learning under privileged information /
# generalized distillation). So this is NOT a pixels-only model: the features
# shape what it learns; they just never appear at inference.
#
# The only other trained condition, configs/vlm_task.yaml, is a thin overlay
# that inherits everything here and adds the task title to the prompt.
seed: 42

paths:
  rows_final: data/processed/rows_final.parquet   # split + winsorized dwell_s
  output_dir: artifacts_lam50/vlm_ckpt                  # trainer checkpoints + final adapters
  train_card: artifacts_lam50/vlm_train_card.md         # stage card (stats, VRAM, parse rate)

lupi:                               # privileged features → soft training target
  teacher_preds: artifacts_lam50/lupi_teacher_preds.parquet  # scripts/make_lupi_teacher.py
  lambda: 0.5                       # single global soft-target weight: 0 = plain
                                    # SFT on the true label, 1 = pure teacher;
                                    # blended in log1p space. THE distillation
                                    # hyperparameter — selected on VAL, never on
                                    # TEST (see configs/sweeps/ + select_lambda.py)

model:
  checkpoint: unsloth/Qwen3-VL-4B-Instruct
  load_in_4bit: true                # QLoRA
  gradient_checkpointing: true      # Unsloth offloaded checkpointing
  max_seq_length: 1536              # ~768 visual tokens + prompt + answer, w/ headroom
  finetune_vision_layers: true      # v2: LoRA the vision layers too, so the
                                    # screenshot itself can drive the estimate
                                    # (both conditions identical — SPEC.md updated)
  lora_r: 16
  lora_alpha: 16
  lora_dropout: 0.05                # v2: regularize — the first run overfit by epoch 2

image:                              # bounds Qwen3-VL visual tokens (28 px grid)
  max_side: 1024
  min_pixels: 100352                # 128 * 28^2  → ≥128 visual tokens
  max_pixels: 602112                # 768 * 28^2  → ≤768 visual tokens

data:
  include_task_title: false         # image only at inference; true = +task (vlm_task.yaml)

train:
  learning_rate: 1.0e-4             # v2: was 2e-4 — the old rate collapsed the
                                    # loss in ~75 steps then overfit for the rest
  num_epochs: 2                     # ~87k resolved train screens at the 100k
                                    # row budget — 2 passes ≈ 11k optim steps
  evals_per_epoch: 4                # v2: evaluate + checkpoint 4×/epoch and keep
                                    # the best (lowest val loss) as `final/` —
                                    # epoch-only saving deployed the overfit epoch
  batch_size: 4                     # per-device micro-batch (verify memory fit
  grad_accum: 4                     #  with --dry-run first) → effective 16
  eval_batch_size: 4
  warmup_ratio: 0.03
  weight_decay: 0.01
  lr_scheduler: cosine
  optim: adamw_8bit
  max_grad_norm: 1.0
  logging_steps: 5
  save_total_limit: 2               # best checkpoint is always kept on top of this
  report_to: wandb
  wandb_project: tot-vlm
  run_name: qwen3vl4b-qlora-pathA

eval:
  decode_samples: 32                # val screens greedily decoded per epoch
  max_new_tokens: 12                # "dwell_seconds: 9999.9" ≈ 10 tokens
  decode_batch_size: 16             # batched FULL-val decode (scripts/decode_val.py)

dry_run:                            # --dry-run: SAME batch/pixels (doubles as the
  n_train: 50                       # memory smoke test), tiny data + few steps
  n_val: 16
  max_steps: 12
  logging_steps: 1
  decode_samples: 8
  report_to: none
