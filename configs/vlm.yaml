# Qwen3-VL QLoRA SFT — emit the v3 scaffolded target:
#   ui: nodes=<int> interactive=<int> links=<int> buttons=<int> inputs=<int> text=<int>
#   dwell_seconds: X.X
# SPEC.md rule: ALL tunable numbers live here, never in code.
#
# Condition 1 of 2 — SCREENSHOT-ONLY (feature-distilled + feature-scaffolded).
# The model sees ONLY the screenshot at inference. The metadata reaches it two
# ways, both train-time only, split by WHEN each feature is knowable:
#  - screen-describing stats (six axTree counts) supervise the `ui:` line of
#    the TARGET TEXT (learning-from-hints / rationale distillation) — at
#    inference the model generates its own estimates from the pixels;
#  - outcome/session features (nav flag, click-target area, step index) are
#    only usable in hindsight, so they reach training solely through the
#    `lupi:` target blend toward the LightGBM teacher (generalized
#    distillation, Lopez-Paz et al. 2016).
# So this is NOT a pixels-only model at TRAIN time — but its inference input
# is exactly one screenshot, which is what makes zero-shot external
# validation (VSGUI10K) possible.
#
# The only other trained condition, configs/vlm_task.yaml, is a thin overlay
# that inherits everything here and adds the task title to the prompt.
seed: 42

paths:
  rows_final: data/processed/rows_final.parquet   # split + winsorized dwell_s
  output_dir: artifacts/vlm_ckpt                  # trainer checkpoints + final adapters
  train_card: artifacts/vlm_train_card.md         # stage card (stats, VRAM, parse rate)

lupi:                               # OUTCOME features → soft training target
  teacher_preds: artifacts/lupi_teacher_preds.parquet  # scripts/make_lupi_teacher.py
  lambda: 0.75                      # single global soft-target weight: 0 = plain
                                    # SFT on the true label, 1 = pure teacher;
                                    # blended in log1p space. THE distillation
                                    # hyperparameter — selected on VAL over the
                                    # fixed grid {0, 0.25, 0.5, 0.75, 1}
                                    # (configs/sweeps/ + select_lambda.py);
                                    # never selected on TEST

model:
  checkpoint: unsloth/Qwen3-VL-4B-Instruct
  load_in_4bit: true                # QLoRA
  gradient_checkpointing: true      # Unsloth offloaded checkpointing
  max_seq_length: 1536              # ~768 visual tokens + prompt + answer, w/ headroom
  finetune_vision_layers: true      # LoRA the vision layers too, so the
                                    # screenshot itself can drive the estimate
                                    # (both conditions identical)
  lora_r: 16
  lora_alpha: 16
  lora_dropout: 0.05                # regularize — the v1 run overfit by epoch 2

image:                              # bounds Qwen3-VL visual tokens (28 px grid)
  max_side: 1024
  min_pixels: 100352                # 128 * 28^2  → ≥128 visual tokens
  max_pixels: 602112                # 768 * 28^2  → ≤768 visual tokens

data:
  include_task_title: false         # image only at inference; true = +task (vlm_task.yaml)
  scaffold: true                    # v3: supervise the `ui:` stats line of the
                                    # target from real axTree counts (train+val)
  scaffold_stats: artifacts/scaffold_stats.parquet  # scripts/make_lupi_teacher.py

train:
  learning_rate: 1.0e-4             # 2e-4 collapsed the loss in ~75 steps then overfit
  num_epochs: 2                     # ~87k resolved train screens at the 100k
                                    # row budget — best-by-val-loss checkpoint
                                    # deploys (v2/v3 runs bottom out well
                                    # before epoch 2; the tail is discarded)
  evals_per_epoch: 4                # evaluate + checkpoint 4×/epoch and keep
                                    # the best (lowest val loss) as `final/` —
                                    # epoch-only saving deployed the overfit epoch
  batch_size: 4                     # per-device micro-batch (verify memory fit
  grad_accum: 4                     #  with --dry-run first) → effective 16
  eval_batch_size: 4
  warmup_ratio: 0.03
  weight_decay: 0.01
  lr_scheduler: cosine
  optim: adamw_8bit
  max_grad_norm: 1.0
  logging_steps: 5
  save_total_limit: 2               # best checkpoint is always kept on top of this
  report_to: wandb
  wandb_project: tot-vlm
  run_name: qwen3vl4b-qlora-v3

eval:
  decode_samples: 32                # val screens greedily decoded per epoch
  max_new_tokens: 48                # scaffold line + "dwell_seconds: 9999.9"
                                    # ≈ 40 tokens, with headroom
  decode_batch_size: 16             # batched FULL-val decode (scripts/decode_val.py)

dry_run:                            # --dry-run: SAME batch/pixels (doubles as the
  n_train: 50                       # memory smoke test), tiny data + few steps
  n_val: 16
  max_steps: 12
  logging_steps: 1
  decode_samples: 8
  report_to: none
