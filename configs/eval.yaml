# TEST-split evaluation: VLM conditions vs LightGBM vs floors, per screen
# AND per task.
seed: 42

# image/prompt knobs MUST match training; axtree knobs MUST match the
# baseline run — read from the configs that produced those models
vlm_config: configs/vlm.yaml
baseline_config: configs/baseline.yaml

paths:
  rows_final: data/processed/rows_final.parquet
  baseline_model: artifacts/baseline_lgbm.txt
  report: artifacts/eval_report.md
  qualitative_dir: artifacts/qualitative
  metrics_json: artifacts/eval_metrics.json
  predictions_parquet: artifacts/eval_predictions.parquet  # make_figures input

# One entry per head-to-head condition; caches are filled if missing,
# missing conditions are listed as pending, never silently skipped.
vlm_models:
  - name: "VLM (screen)"            # science core: what the screen ALONE predicts
    adapters: artifacts/vlm_ckpt/final
    preds: artifacts/vlm_test_preds.parquet
    include_task_title: false
  - name: "VLM (screen+task)"       # the Time-on-Task PREDICTOR condition
    adapters: artifacts/vlm_task_ckpt/final
    preds: artifacts/vlm_task_test_preds.parquet
    include_task_title: true
  # Optional ablation — is fine-tuning even necessary? Same backbone, no
  # training, same prompt+task title. Uncomment to add the row (costs one
  # extra decode pass over TEST in the GPU job):
  # - name: "VLM (zero-shot)"
  #   adapters: unsloth/Qwen3-VL-4B-Instruct
  #   preds: artifacts/vlm_zeroshot_test_preds.parquet
  #   include_task_title: true

predict:                    # GPU stage
  batch_size: 8
  max_new_tokens: 12        # "dwell_seconds: 9999.9" ≈ 10 tokens

scoring:
  fallback: train_median    # unparseable → TRAIN median; rate always reported
  clip_pred_to_winsor: true # clip preds to the range the model was trained on
  calibration_bins: 10
  task_min_steps: 2         # 1-screen "tasks" are per-screen rows in disguise

report:
  primary_model: "VLM (screen)"   # drives calibration table + qualitative

qualitative:
  n: 6                      # 2 best / 2 median / 2 worst by |log error|
  banner_height: 44         # annotation strip above each screenshot, px
