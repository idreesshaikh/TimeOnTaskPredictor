# TEST-split evaluation: VLM conditions vs CNN (pixels only) vs LightGBM
# (features only) vs floors, per screen AND per task.
seed: 42

# axtree knobs MUST match the baseline run; each VLM condition's image/prompt
# knobs come from its own `config:` (the config it was trained with)
baseline_config: configs/baseline.yaml

paths:
  rows_final: data/processed/rows_final.parquet
  baseline_model: artifacts/baseline_lgbm.txt
  cnn_preds: artifacts/cnn_test_preds.parquet    # scripts/train_cnn_baseline.py
  report: artifacts/eval_report.md
  qualitative_dir: artifacts/qualitative
  metrics_json: artifacts/eval_metrics.json
  predictions_parquet: artifacts/eval_predictions.parquet  # make_figures input

# One entry per trained condition; caches are filled if missing, missing
# conditions are listed as pending, never silently skipped. Prompt flags
# (task title, scaffold, feature input) are read from each condition's own
# training config so evaluation can never drift from training. Conditions
# 1–2 are screenshot-only at inference (metadata distilled in at train time);
# conditions 3–4 are GIVEN the six screen-describing ui-stats in the prompt
# (upper bound — no distillation, true labels).
vlm_models:
  - name: "VLM (screen, distilled)"        # screenshot in; features shape training only
    config: configs/vlm.yaml
    adapters: artifacts/vlm_ckpt/final
    preds: artifacts/vlm_test_preds.parquet
  - name: "VLM (screen+task, distilled)"   # + the task title in the prompt
    config: configs/vlm_task.yaml
    adapters: artifacts/vlm_task_ckpt/final
    preds: artifacts/vlm_task_test_preds.parquet
  - name: "VLM (screen+features)"          # ui-stats GIVEN in the prompt
    config: configs/vlm_feat.yaml
    adapters: artifacts/vlm_feat_ckpt/final
    preds: artifacts/vlm_feat_test_preds.parquet
  - name: "VLM (screen+features+task)"     # + the task title on top
    config: configs/vlm_feat_task.yaml
    adapters: artifacts/vlm_feat_task_ckpt/final
    preds: artifacts/vlm_feat_task_test_preds.parquet

predict:                    # GPU stage
  batch_size: 8
  max_new_tokens: 48        # scaffold `ui:` line + dwell line, with headroom

scoring:
  fallback: train_median    # unparseable → TRAIN median; rate always reported
  clip_pred_to_winsor: true # clip preds to the range the model was trained on
  calibration_bins: 10
  task_min_steps: 2         # 1-screen "tasks" are per-screen rows in disguise

report:
  primary_model: "VLM (screen, distilled)"   # drives calibration table + qualitative

qualitative:
  n: 6                      # 2 best / 2 median / 2 worst by |log error|
  banner_height: 44         # annotation strip above each screenshot, px
