# Dataset construction knobs (CLAUDE.md: all tunable numbers live here).
seed: 42

paths:
  rows_resolved: data/processed/rows_resolved.parquet   # input (has img_resolved)
  rows_final: data/processed/rows_final.parquet         # output: + split/dwell_s/y
  splits_json: artifacts/splits.json
  dataset_card: artifacts/dataset_card.md

splits:                    # by REGISTRABLE DOMAIN count, never by trajectory/step
  fractions:
    train: 0.70
    val: 0.15
    test: 0.15

filters:                   # hard dwell filters (already applied at label build)
  min_dwell_s: 0.05
  max_dwell_s: 600.0

winsor:
  percentile: 0.95         # cap = this quantile of dwell_s_raw on TRAIN ONLY

resolve:
  # Whole-TRAJECTORY sampling per split (seeded, prefix-stable, resumable) —
  # complete tasks only, so the task-level eval never sees missing screens.
  row_budgets:             # ~115k rows ≈ 100k unique screenshots ≈ 12 GB
    train: 100000          # ≈ 15k complete tasks (SFT wants volume)
    val: 5000              # ≈ 770 (per-epoch eval loss + decode probe)
    test: 10000            # ≈ 1550 (task-level eval lives here)
  store:                   # JPEG re-encode at download ⇒ ~3× less disk
    max_side: 1280
    jpeg_quality: 85
