# Dataset construction knobs (SPEC.md: all tunable numbers live here).
seed: 42

paths:
  rows_resolved: data/processed/rows_resolved.parquet   # input (has img_resolved)
  rows_final: data/processed/rows_final.parquet         # output: + split/dwell_s/y
  splits_json: artifacts/splits.json
  dataset_card: artifacts/dataset_card.md

splits:                    # by REGISTRABLE DOMAIN count, never by trajectory/step
  fractions:
    train: 0.70
    val: 0.15
    test: 0.15

filters:                   # hard dwell filters (already applied at label build)
  min_dwell_s: 0.05
  max_dwell_s: 600.0

winsor:
  percentile: 0.95         # cap = this quantile of dwell_s_raw on TRAIN ONLY

resolve:                   # screenshot download strategy (disk/time bounded)
  # All ~182k screenshots ≈ 122 GB — infeasible. Instead: whole-TRAJECTORY
  # sampling per split (seeded, PREFIX-STABLE: growing a budget only adds
  # trajectories, cache always reused; resumable — rerun any time, it
  # continues). Complete trajectories ⇒ no sampled task has missing screens,
  # which the task-level evaluation needs. Budgets are in ROWS (≈ screens);
  # median task ≈ 5 rows.
  row_budgets:               # ~115k rows ≈ 100k unique screenshots ≈ 12 GB
    train: 100000          # ≈ 15k complete tasks (SFT wants volume)
    val: 5000              # ≈ 770 (per-epoch eval loss + decode probe)
    test: 10000            # ≈ 1550 (generous: task-level eval lives here)
  # Downscale + re-encode at download time: stored images only need to be
  # ≥ the training input bound (image.max_side 1024 in configs/vlm.yaml).
  # ~670 KB PNG → ~150-250 KB JPEG ⇒ ~3× less disk. null = keep original.
  store:
    max_side: 1280
    jpeg_quality: 85
