[project]
name = "Time-On-Task-Predictor"
version = "0.1.0"
requires-python = ">=3.12,<3.13"
description = "An HCI project, part of Computational Modeling Course"
authors = [
    { name="Idrees Razak", email="asadidrees.razak@student.hpi.de" }
]
dependencies = [
    "torch==2.5.1",
    "torchvision==0.20.1",
    "torchaudio==2.5.1",
    "transformers==4.57.1",
]

[dependency-groups]
dev = [
    "ruff>=0.15.16",
]

[[tool.uv.index]]
name = "pytorch-cu121"
url = "https://download.pytorch.org/whl/cu121"
explicit = true

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"