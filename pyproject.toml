[project]
name = "Time-On-Task-Predictor"
version = "0.1.0"
requires-python = ">=3.13"
description = "An HCI project, part of Computational Modeling Course"
authors = [
    { name="Idrees Razak", email="asadidrees.razak@student.hpi.de" }
]
dependencies = [
    "torch==2.12.0",
    "transformers==4.57.1",
]

[dependency-groups]
dev = [
    "ruff>=0.15.16",
]

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"